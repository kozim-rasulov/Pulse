<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse</title>
    <link rel="stylesheet" href="css/bootstrap-reboot.min.css">
    <link rel="stylesheet" href="css/font.css">
    <link rel="stylesheet" href="css/style.min.css">
</head>
<body>
    <div class="promo">
        <div class="container">
            <header class="header">
                <a href="#" class="header__logo">
                    <img src="img/logo.png" alt="logo_png">
                </a>
                <p class="header__official">Официальный представитель<span>Garmin, Polar, Suunto</span></p>
                <div class="header__contacts">
                    <a href="tel:+998903229968" class="header__phone">+998 (90) 322-99-68</a>
                    <button class="button">заказать звонок</button>
                </div>
            </header>
            <div class="promo__wrapper">
                <h1 class="promo__header">Подбор пульсометра</h1>
                <h2 class="promo__subheader">с учётом Вашего уровня подготовки</h2>
                <div class="promo__icons">
                    <div class="promo__icon">
                        <img src="icons/stopwatch.png" alt="stopwatch_png">
                        <p>Время подбора: 10 минут</p>
                    </div>
                    <div class="promo__icon">
                        <img src="icons/hand-cart.png" alt="hand-cart_png">
                        <p>Бесплатная доставка</p>
                    </div>
                    <div class="promo__icon">
                        <img src="icons/messages.png" alt="messages_png">
                        <p>Ответим на все вопросы</p>
                    </div>
                </div>
                <button class="button button_main">заказать кОНСУЛЬТАЦИЮ</button>
                <div class="promo__link">
                    или
                    <a href="#">ПЕРЕЙТИ В КАТАЛОГ</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
